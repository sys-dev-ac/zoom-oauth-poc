version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: linkedin_oauth_pg
    environment:
      POSTGRES_USER: linkedin_user
      POSTGRES_PASSWORD: linkedin_pass
      POSTGRES_DB: linkedin_oauth
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkedin_user -d linkedin_oauth"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
